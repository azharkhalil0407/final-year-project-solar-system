<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orrery — Interactive Solar System</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#000;font-family:'Inter',system-ui,sans-serif}
  canvas{display:block}

  .panel{
    position:fixed;background:rgba(8,12,24,0.72);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.08);border-radius:16px;color:#e8eaf0;
    pointer-events:none;transition:opacity .4s
  }

  #title-panel{top:24px;left:24px;padding:16px 22px;pointer-events:auto}
  #title-panel h1{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#c5cadf;margin-bottom:2px}
  #title-panel p{font-size:10px;letter-spacing:1px;color:#555e7a;text-transform:uppercase}

  #info-card{
    top:50%;right:24px;transform:translateY(-50%);
    width:230px;padding:20px;opacity:0;pointer-events:none
  }
  #info-card.visible{opacity:1}
  #info-card .planet-icon{
    width:48px;height:48px;border-radius:50%;margin-bottom:14px;
    display:flex;align-items:center;justify-content:center;font-size:22px
  }
  #info-card h2{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
  #info-card .subtitle{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555e7a;margin-bottom:16px}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
  .stat-row:last-child{border-bottom:none}
  .stat-label{font-size:10px;color:#555e7a;text-transform:uppercase;letter-spacing:1px}
  .stat-value{font-size:12px;font-weight:600;color:#c5cadf}
  #close-btn{
    margin-top:14px;width:100%;padding:8px;border-radius:8px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);

  #close-btn:hover{background:rgba(255,255,255,0.12);color:#c5cadf}

  #controls-panel{
    bottom:24px;left:50%;transform:translateX(-50%);

  .ctrl-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#555e7a}
  .ctrl-value{font-size:12px;font-weight:600;color:#c5cadf;min-width:28px;text-align:center}
  .ctrl-sep{width:1px;height:24px;background:rgba(255,255,255,0.08)}
  input[type=range]{
    -webkit-appearance:none;width:100px;height:2px;
    background:rgba(255,255,255,0.15);border-radius:2px;cursor:pointer;outline:none
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:#4f7eff;border:2px solid #0a0f1e;cursor:pointer
  }
  #pause-btn{
    width:30px;height:30px;border-radius:50%;
    background:rgba(79,126,255,0.15);border:1px solid rgba(79,126,255,0.4);

    color:#8891aa;font-size:9px;letter-spacing:2px;text-transform:uppercase;

  }
  .pnav:hover,.pnav.active{border-color:rgba(255,255,255,0.25);color:#c5cadf;background:rgba(255,255,255,0.06)}

  #legend{position:fixed;top:24px;right:24px;padding:12px 16px;pointer-events:none}

  #tooltip{
    position:fixed;pointer-events:none;
    background:rgba(8,12,24,0.85);border:1px solid rgba(255,255,255,0.1);

  }

  #hint{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);
    font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#2a3050;
    transition:opacity 2s;pointer-events:none}
</style>

<body>

<div id="loader">
  <h1>Orrery</h1>
  <div class="load-bar-bg"><div class="load-bar" id="load-bar"></div></div>

<div class="panel" id="title-panel">

</div>

<div class="panel" id="info-card">
  <div class="planet-icon" id="ic-icon"></div>
  <h2 id="ic-name">Earth</h2>
  <div class="subtitle" id="ic-type">Terrestrial Planet</div>
  <div class="stat-row"><span class="stat-label">Distance from Sun</span><span class="stat-value" id="ic-dist">—</span></div>

  <button id="pause-btn" title="Pause/Resume">⏸</button>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">Orbits</span>
  <button id="orbits-btn" style="padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#8891aa;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer">ON</button>
  <div class="ctrl-sep"></div>
  <button id="reset-btn">Reset View</button>
</div>

<div id="planet-nav"></div>

<div id="tooltip"></div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.155.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.155.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const PLANET_DATA = [
  { name:'Mercury', type:'Terrestrial Planet', color:'#b5956a', emissive:'#3a2510', size:.42, dist:9.5,  speed:.048,
    realDist:'57.9 M km', period:'88 days',  diam:'4,879 km',  temp:'-180 / 430°C', moons:'0',  axialTilt:0.03, rings:false },
  { name:'Venus',   type:'Terrestrial Planet', color:'#e8c96a', emissive:'#4a3000', size:.60, dist:13.5, speed:.035,
    realDist:'108.2 M km',period:'225 days', diam:'12,104 km', temp:'462°C avg',    moons:'0',  axialTilt:177.4, rings:false },
  { name:'Earth',   type:'Terrestrial Planet', color:'#3a7bd5', emissive:'#001244', size:.64, dist:18.0, speed:.029,
    realDist:'149.6 M km',period:'365 days', diam:'12,742 km', temp:'-88 / 58°C',  moons:'1',  axialTilt:23.4,  rings:false, isEarth:true },
  { name:'Mars',    type:'Terrestrial Planet', color:'#c0522a', emissive:'#3a0d00', size:.52, dist:23.5, speed:.024,
    realDist:'227.9 M km',period:'687 days', diam:'6,779 km',  temp:'-125 / 20°C', moons:'2',  axialTilt:25.2,  rings:false },
  { name:'Jupiter', type:'Gas Giant',          color:'#c4935e', emissive:'#2a1500', size:1.55, dist:33.0, speed:.013,
    realDist:'778.5 M km',period:'12 years', diam:'139,820 km',temp:'-108°C avg',  moons:'95', axialTilt:3.1,   rings:false },
  { name:'Saturn',  type:'Gas Giant',          color:'#dfc489', emissive:'#382800', size:1.35, dist:42.5, speed:.0096,
    realDist:'1.43 B km', period:'29 years', diam:'116,460 km',temp:'-138°C avg',  moons:'146',axialTilt:26.7,  rings:true  },
  { name:'Uranus',  type:'Ice Giant',          color:'#7de8e8', emissive:'#003030', size:1.10, dist:51.0, speed:.0068,
    realDist:'2.87 B km', period:'84 years', diam:'50,724 km', temp:'-195°C avg',  moons:'28', axialTilt:97.8,  rings:true, thinRings:true },
  { name:'Neptune', type:'Ice Giant',          color:'#3a6fdf', emissive:'#000e3a', size:1.05, dist:59.5, speed:.0054,
    realDist:'4.50 B km', period:'165 years',diam:'49,244 km', temp:'-200°C avg',  moons:'16', axialTilt:28.3,  rings:false },
];


const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 3000);
camera.position.set(0, 38, 90);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 6;
controls.maxDistance = 400;
controls.enablePan = false;
controls.autoRotate = false;


const ambientLight = new THREE.AmbientLight(0x111122, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xffd0a0, 3.5, 300);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048,2048);
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 300;
scene.add(sunLight);

// Secondary warm fill to soften hard shadows
const fill = new THREE.DirectionalLight(0xff8844, 0.15);
fill.position.set(10,20,30);
scene.add(fill);


function makeStars(count, radiusMin, radiusMax, size, color) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i=0; i<count; i++) {
    const r = radiusMin + Math.random()*(radiusMax-radiusMin);
    const th = Math.random()*Math.PI*2;
    const ph = Math.acos(2*Math.random()-1);
    pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2] = r*Math.cos(ph);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  return new THREE.Points(geo, new THREE.PointsMaterial({color,size,transparent:true,opacity:.85,sizeAttenuation:true}));
}
scene.add(makeStars(5000, 200, 600, 0.35, 0xffffff));
scene.add(makeStars(3000, 600, 1500, 0.6, 0xbbccff));
scene.add(makeStars(1500, 200, 400, 0.15, 0xffeedd));

const SUN_R = 4.2;

// Core
const sunMat = new THREE.MeshStandardMaterial({
  color: 0xff9933,
  emissive: 0xff5500,
  emissiveIntensity: 2.2,
  roughness: 1, metalness: 0
});
const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_R, 128, 128), sunMat);
scene.add(sunMesh);

// Corona — custom shader (Fresnel rim glow)
const coronaMat = new THREE.ShaderMaterial({
  uniforms: { time:{value:0}, glowColor:{value:new THREE.Color(0xff6600)} },
  vertexShader:`
    varying vec3 vNormal;varying vec3 vPosition;
    void main(){vNormal=normalize(normalMatrix*normal);vPosition=position;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform float time;uniform vec3 glowColor;
    varying vec3 vNormal;varying vec3 vPosition;
    void main(){
      vec3 vn=normalize(vNormal);
      float rim=1.-abs(dot(vn,vec3(0.,0.,1.)));
      float pulse=.8+.2*sin(time*1.4+vPosition.y*.8);
      float alpha=pow(rim,2.)*1.2*pulse;
      gl_FragColor=vec4(glowColor,alpha*0.9);}`,
  transparent:true, side:THREE.FrontSide, depthWrite:false, blending:THREE.AdditiveBlending
});
const coronaMesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_R*1.18,64,64), coronaMat);
scene.add(coronaMesh);

// Outer haze
const hazeMat = new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.04,side:THREE.BackSide});
const hazeMesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_R*2.2,32,32), hazeMat);
scene.add(hazeMesh);

// Sun surface noise flicker (extra emissive sphere, pulsing)
const sunSurface = new THREE.Mesh(new THREE.SphereGeometry(SUN_R*.99,64,64),
  new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true,opacity:.15}));
scene.add(sunSurface);


function makeAtmosphere(radius, color, intensity=1.0) {
  const mat = new THREE.ShaderMaterial({
    uniforms:{ glowColor:{value:new THREE.Color(color)}, intensity:{value:intensity} },
    vertexShader:`
      varying vec3 vNormal;varying vec3 vView;
      void main(){vNormal=normalize(normalMatrix*normal);
        vec4 mv=modelViewMatrix*vec4(position,1.);vView=normalize(-mv.xyz);
        gl_Position=projectionMatrix*mv;}`,
    fragmentShader:`
      uniform vec3 glowColor;uniform float intensity;
      varying vec3 vNormal;varying vec3 vView;
      void main(){
        float rim=1.-max(0.,dot(vNormal,vView));
        rim=pow(rim,3.5)*intensity;
        gl_FragColor=vec4(glowColor,rim*.7);}`,
    transparent:true, side:THREE.FrontSide, depthWrite:false, blending:THREE.AdditiveBlending
  });
  return new THREE.Mesh(new THREE.SphereGeometry(radius,64,64), mat);
}


function makeSaturnRings(innerR, outerR) {
  const segments = 256;
  const geo = new THREE.BufferGeometry();
  const verts = [], uvs = [], indices = [];
  for (let i=0; i<=segments; i++) {
    const a = (i/segments)*Math.PI*2;
    const cos=Math.cos(a), sin=Math.sin(a);
    verts.push(innerR*cos,0,innerR*sin, outerR*cos,0,outerR*sin);
    const u = i/segments;
    uvs.push(0,u, 1,u);
  }
  for (let i=0; i<segments; i++) {
    const b=i*2;
    indices.push(b,b+1,b+2, b+1,b+3,b+2);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts),3));
  geo.setAttribute('uv',new THREE.BufferAttribute(new Float32Array(uvs),2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const mat = new THREE.ShaderMaterial({
    uniforms:{ innerRadius:{value:innerR}, outerRadius:{value:outerR},
               ringColor:{value:new THREE.Color(0xd4b896)}, time:{value:0} },
    vertexShader:`
      varying vec2 vUv;varying float vDist;
      void main(){vUv=uv;
        float len=length(position.xz);float inner=${innerR.toFixed(2)};float outer=${outerR.toFixed(2)};
        vDist=(len-inner)/(outer-inner);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`
      uniform vec3 ringColor;uniform float time;
      varying vec2 vUv;varying float vDist;
      float rand(float n){return fract(sin(n)*43758.5453);}
      void main(){
        float t=vDist;
        float band=step(.04,fract(t*18.))*.6+.4;
        float density=.65+.35*sin(t*80.+.3);
        float inner=smoothstep(0.,.05,t);float outer=smoothstep(1.,.82,t);
        float alpha=band*density*inner*outer*.88;
        vec3 col=mix(ringColor,vec3(1.,.95,.8),t*.4);
        gl_FragColor=vec4(col,alpha);}`,
    transparent:true, side:THREE.DoubleSide, depthWrite:false
  });
  return new THREE.Mesh(geo, mat);
}

function makeUranusRings(r, halfWidth) {
  const geo = new THREE.TorusGeometry(r, halfWidth, 2, 200);
  const mat = new THREE.MeshBasicMaterial({color:0x99cccc,transparent:true,opacity:.35,side:THREE.DoubleSide});
  return new THREE.Mesh(geo, mat);
}


const planetObjects = [];
const orbitLines = [];

function buildOrbitLine(radius) {
  const pts=[];
  for(let i=0;i<=256;i++){const a=(i/256)*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*radius,0,Math.sin(a)*radius));}
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineBasicMaterial({color:0x334466,transparent:true,opacity:.4});
  const line=new THREE.LineLoop(geo,mat);
  scene.add(line);
  return line;
}

PLANET_DATA.forEach((d, i) => {
  const orbit = buildOrbitLine(d.dist);
  orbitLines.push(orbit);

  // Planet sphere
  const mat = new THREE.MeshStandardMaterial({
    color: d.color,
    emissive: d.emissive,
    emissiveIntensity: 0.12,
    roughness: 0.82,
    metalness: 0.06
  });

  // Earth gets specular treatment
  if (d.isEarth) {
    mat.roughness = 0.55;
    mat.metalness = 0.12;
  }

  const mesh = new THREE.Mesh(new THREE.SphereGeometry(d.size, 96, 96), mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.rotation.z = THREE.MathUtils.degToRad(d.axialTilt || 0);

  // Pivot for orbital rotation
  const pivot = new THREE.Object3D();
  pivot.rotation.y = Math.random() * Math.PI * 2; // random start
  pivot.add(mesh);
  mesh.position.x = d.dist;
  scene.add(pivot);

  // Atmospheric glow
  let atmoMesh = null;
  if (d.isEarth) {
    atmoMesh = makeAtmosphere(d.size*1.05, '#4488ff', 1.4);
    mesh.add(atmoMesh);
  } else if (d.name==='Venus') {
    atmoMesh = makeAtmosphere(d.size*1.04, '#ddaa44', 0.9);
    mesh.add(atmoMesh);
  } else if (d.name==='Neptune') {
    atmoMesh = makeAtmosphere(d.size*1.03, '#2244cc', 0.8);
    mesh.add(atmoMesh);
  }

  // Saturn disc rings
  let ringMesh = null;
  if (d.rings && !d.thinRings) {
    ringMesh = makeSaturnRings(d.size*1.35, d.size*2.45);
    ringMesh.rotation.x = THREE.MathUtils.degToRad(26);
    mesh.add(ringMesh);
  }
  if (d.thinRings) {
    // Uranus rings (tilted 90°)
    ringMesh = makeUranusRings(d.size*1.6, 0.09);
    ringMesh.rotation.z = THREE.MathUtils.degToRad(90);
    mesh.add(ringMesh);
  }

  // Cloud layer for Earth
  if (d.isEarth) {
    const cloudMesh = new THREE.Mesh(
      new THREE.SphereGeometry(d.size*1.012, 64, 64),
      new THREE.MeshStandardMaterial({ color:0xffffff, transparent:true, opacity:.18, depthWrite:false })
    );
    mesh.add(cloudMesh);
    planetObjects.push({ ...d, pivot, mesh, cloudMesh, ring:ringMesh, idx:i, angle:pivot.rotation.y });
    return;
  }

  planetObjects.push({ ...d, pivot, mesh, ring:ringMesh, idx:i, angle:pivot.rotation.y });
});

(function() {
  const count=6000, geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3), cols=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r=26.5+Math.random()*5.5, a=Math.random()*Math.PI*2;
    pos[i*3]=Math.cos(a)*r; pos[i*3+1]=(Math.random()-.5)*.9; pos[i*3+2]=Math.sin(a)*r;
    const c=.4+Math.random()*.4;
    cols[i*3]=c; cols[i*3+1]=c*.9; cols[i*3+2]=c*.7;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  const mat=new THREE.PointsMaterial({size:.065,vertexColors:true,transparent:true,opacity:.75});
  scene.add(new THREE.Points(geo,mat));
})();

let speedMult = 1.0;
let paused = false;
let orbitsVisible = true;
let selectedPlanet = null;
let cameraTarget = null;
let cameraTargetPos = new THREE.Vector3();
let cameraLerpActive = false;

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const infoCard = document.getElementById('info-card');
const speedSlider = document.getElementById('speed-slider');
const speedDisplay = document.getElementById('speed-display');

// Build planet nav pills
const nav = document.getElementById('planet-nav');
PLANET_DATA.forEach((d,i) => {
  const btn = document.createElement('button');
  btn.className='pnav'; btn.textContent=d.name; btn.dataset.idx=i;
  btn.addEventListener('click', () => focusPlanet(i));
  nav.appendChild(btn);
});

speedSlider.addEventListener('input', () => {
  speedMult = parseFloat(speedSlider.value);
  speedDisplay.textContent = speedMult.toFixed(1)+'×';
});

document.getElementById('pause-btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';
});

document.getElementById('orbits-btn').addEventListener('click', function() {
  orbitsVisible = !orbitsVisible;
  orbitLines.forEach(l => l.visible=orbitsVisible);
  this.textContent = orbitsVisible ? 'ON' : 'OFF';
  this.style.color = orbitsVisible ? '' : '#4f7eff';
});

document.getElementById('reset-btn').addEventListener('click', () => {
  cameraTargetPos.set(0,38,90);
  controls.target.set(0,0,0);
  cameraLerpActive = true;
  clearSelection();
});

document.getElementById('close-btn').addEventListener('click', clearSelection);

// Click to select planet
renderer.domElement.addEventListener('click', onCanvasClick);
renderer.domElement.addEventListener('mousemove', onMouseMove);

function getWorldPos(planetObj) {
  const wp = new THREE.Vector3();
  planetObj.mesh.getWorldPosition(wp);
  return wp;
}

function onMouseMove(e) {
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = planetObjects.map(p=>p.mesh);
  // also add sun
  const hits = raycaster.intersectObjects([sunMesh, ...meshes]);
  if (hits.length) {
    const obj = hits[0].object;
    let name = obj===sunMesh ? 'Sun' : (planetObjects.find(p=>p.mesh===obj)||{name:''}).name;
    if (name) {
      tooltip.textContent = name;
      tooltip.style.display='block';
      tooltip.style.left=e.clientX+'px';
      tooltip.style.top=e.clientY+'px';
      renderer.domElement.style.cursor='pointer';
    }
  } else {
    tooltip.style.display='none';
    renderer.domElement.style.cursor='grab';
  }
}

function onCanvasClick(e) {
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(planetObjects.map(p=>p.mesh));
  if (hits.length) {
    const pObj = planetObjects.find(p=>p.mesh===hits[0].object);
    if (pObj) focusPlanet(pObj.idx);
  } else if (raycaster.intersectObject(sunMesh).length) {
    showSunInfo();
  }
}

function focusPlanet(idx) {
  selectedPlanet = idx;
  const p = planetObjects[idx];
  const wp = getWorldPos(p);
  const pullback = p.size * 6 + 8;
  const dir = new THREE.Vector3().subVectors(camera.position, wp).normalize();
  cameraTargetPos.copy(wp).addScaledVector(dir, pullback);
  cameraLerpActive = true;
  controls.target.copy(wp);

  // Update nav pills
  document.querySelectorAll('.pnav').forEach((b,i)=>b.classList.toggle('active',i===idx));

  // Populate info card
  document.getElementById('ic-name').textContent = p.name;
  document.getElementById('ic-type').textContent = p.type;
  document.getElementById('ic-dist').textContent = p.realDist;
  document.getElementById('ic-period').textContent = p.period;
  document.getElementById('ic-diam').textContent = p.diam;
  document.getElementById('ic-temp').textContent = p.temp;
  document.getElementById('ic-moons').textContent = p.moons;
  const icon = document.getElementById('ic-icon');
  icon.style.background = p.color+'33';
  icon.style.border = '1px solid '+p.color+'55';
  icon.style.color = p.color;
  icon.textContent = ['☿','♀','🌍','♂','♃','♄','⛢','♆'][idx];
  infoCard.classList.add('visible');
}

function showSunInfo() {
  clearSelection();
  cameraTargetPos.set(0,10,20);
  controls.target.set(0,0,0);
  cameraLerpActive=true;
}

function clearSelection() {
  selectedPlanet = null;
  infoCard.classList.remove('visible');
  document.querySelectorAll('.pnav').forEach(b=>b.classList.remove('active'));
}


// ANIMATION LOOP
let prevTime = performance.now();
let frameCount=0, fpsTime=performance.now();

function tick() {
  requestAnimationFrame(tick);
  const now = performance.now();
  const dt = Math.min((now-prevTime)/1000, 0.05);
  prevTime = now;

  const t = now/1000;
  const spd = paused ? 0 : speedMult;

  // Sun animation
  coronaMat.uniforms.time.value = t;
  sunMesh.rotation.y += dt * 0.12 * spd;
  sunSurface.material.opacity = 0.1 + 0.06*Math.sin(t*2.1);
  sunLight.intensity = 3.2 + 0.3*Math.sin(t*1.6);

  // Planets
  planetObjects.forEach(p => {
    p.pivot.rotation.y += p.speed * dt * spd * 10;
    p.mesh.rotation.y += dt * 0.5;
    if (p.cloudMesh) p.cloudMesh.rotation.y += dt * 0.08;
    if (p.name==='Saturn' && p.ring) {
      // ring wobble
    }
  });

  if (cameraLerpActive) {
    const lf = 1 - Math.pow(0.04, dt);
    camera.position.lerp(cameraTargetPos, lf);
    if (selectedPlanet!==null) {
      const wp = getWorldPos(planetObjects[selectedPlanet]);
      controls.target.lerp(wp, lf);
    }
    if (camera.position.distanceTo(cameraTargetPos) < 0.1) cameraLerpActive=false;
  }

  controls.update();
  renderer.render(scene, camera);

  // FPS counter
  frameCount++;
  if (now-fpsTime>=1000) {
    document.getElementById('status').textContent = frameCount+' fps';
    frameCount=0; fpsTime=now;
  }
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});


// LOADING SEQUENCE
const loadSteps = ['Initializing scene','Building star field','Constructing planets','Calibrating orbits','Launch'];
let step=0;
const bar=document.getElementById('load-bar');
const loadText=document.getElementById('load-text');
const loader=document.getElementById('loader');

function advanceLoader() {
  if (step>=loadSteps.length) {
    loader.style.opacity='0';
    setTimeout(()=>loader.remove(), 1000);

    // Fade in hint then fade it out after 5s
    const hint=document.getElementById('hint');
    hint.style.opacity='1';
    setTimeout(()=>hint.style.opacity='0',5000);

    tick();
    return;
  }
  bar.style.width=(step/(loadSteps.length-1)*100)+'%';
  loadText.textContent=loadSteps[step];
  step++;
  setTimeout(advanceLoader, step===loadSteps.length ? 600 : 280);
}
advanceLoader();

</script>
